io[]; showRuler: boolean; text: TextSettings; icon: IconSettings; background: BackgroundSettings; // Actions toggleRatio: (ratio: AspectRatio) => void; setShowRuler: (show: boolean) => void; updateText: (settings: Partial<TextSettings>) => void; updateIcon: (settings: Partial<IconSettings>) => void; updateBackground: (settings: Partial<BackgroundSettings>) => void; } export const useCoverStore = create<CoverState>((set) => ({ selectedRatios: ['16:9'], showRuler: true, text: { fontSize: 160, color: '#000000', strokeColor: '#ffffff', strokeWidth: 0, fontWeight: 700, rotation: 0, font: 'Inter, sans-serif', leftContent: '左侧', rightContent: '右侧', leftAlign: 'center', rightAlign: 'center', leftOffsetX: 0, leftOffsetY: 0, rightOffsetX: 0, rightOffsetY: 0, }, icon: { visible: true, placement: 'front', name: 'logos:react', size: 120, color: '#000000', shadow: true, x: 0, y: 0, rotation: 0, bgShape: 'rounded-square', // Default to a nice card look bgColor: '#ffffff', padding: 30, radius: 20, shadowColor: 'rgba(0,0,0,0.3)', shadowBlur: 6, shadowOffsetY: 4, bgOpacity: 1, bgBlur: 0, customIconRadius: 0, }, background: { type: 'solid', color: '#f3f4f6', imageUrl: '', blur: 0, radius: 0, shadow: false, opacity: 1, shadowColor: 'rgba(0,0,0,0.3)', shadowBlur: 30, shadowOffsetY: 10, scale: 1, positionX: 50, positionY: 50, rotation: 0, }, toggleRatio: (ratio) => set((state) => { const exists = state.selectedRatios.includes(ratio); if (exists && state.selectedRatios.length === 1) return state; // Prevent empty return { selectedRatios: exists ? state.selectedRatios.filter((r) => r !== ratio) : [...state.selectedRatios, ratio], }; }), setShowRuler: (show) => set({ showRuler: show }), updateText: (settings) => set((state) => ({ text: { ...state.text, ...settings } })), updateIcon: (settings) => set((state) => ({ icon: { ...state.icon, ...settings } })), updateBackground: (settings) => set((state) => ({ background: { ...state.background, ...settings } })), }));"
